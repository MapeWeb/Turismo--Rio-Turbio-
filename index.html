<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Río Turbio - Guía Inteligente</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #004a8c; --accent: #f39c12; --bg: #f0f2f5; --light: #ffffff;
        }

        body { font-family: 'Inter', sans-serif; margin: 0; padding-bottom: 160px; background-color: var(--bg); }

        header { background: var(--primary); color: white; padding: 25px 15px; text-align: center; border-bottom-left-radius: 25px; border-bottom-right-radius: 25px; }

        nav { display: flex; justify-content: center; padding: 15px; gap: 10px; position: sticky; top: 0; z-index: 100; background: var(--bg); }

        nav button { background: var(--light); color: var(--primary); border: none; padding: 10px 18px; border-radius: 25px; font-size: 0.85rem; font-weight: bold; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.05); transition: 0.3s; }

        nav button.active { background: var(--primary); color: white; }

        .container { padding: 15px; max-width: 900px; margin: auto; }

        .page { display: none; animation: fade 0.4s ease; }
        .page.active { display: block; }

        @keyframes fade { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .grid-universal { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }

        @media (max-width: 600px) { .grid-universal { grid-template-columns: repeat(2, 1fr); } }

        .card-mini { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 8px rgba(0,0,0,0.05); text-align: center; cursor: pointer; transition: 0.2s; border: 2px solid transparent; }
        .card-mini:hover { transform: translateY(-3px); border-color: var(--accent); }
        .card-mini img { width: 100%; height: 90px; object-fit: cover; display: block; }
        .card-mini h3 { font-size: 0.7rem; margin: 8px 5px; color: var(--primary); height: 25px; display: flex; align-items: center; justify-content: center; }

        .detalle-comercio { background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .detalle-header img { width: 100%; height: 220px; object-fit: cover; }
        .detalle-body { padding: 20px; }
        .detalle-body h2 { color: var(--primary); margin: 0 0 10px 0; }
        .info-item { margin-bottom: 10px; font-size: 0.9rem; display: flex; align-items: center; gap: 8px; }
        .btn-volver { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 10px; margin-bottom: 15px; cursor: pointer; font-weight: bold; }

        .fixed-player { position: fixed; bottom: 0; left: 0; right: 0; background: white; padding: 15px; box-shadow: 0 -5px 20px rgba(0,0,0,0.1); border-top: 4px solid var(--primary); z-index: 1000; }
        #playing-title { text-align: center; font-size: 0.85rem; font-weight: bold; color: var(--primary); margin-bottom: 8px; }
    </style>
</head>
<body>

<header>
    <h1>Río Turbio</h1>
    <p>Turismo Inteligente 2026</p>
</header>

<nav>
    <button onclick="showPage('audioguias')" id="btn-audioguias" class="active">🔊 Guías</button>
    <button onclick="showPage('hoteles')" id="btn-hoteles">🏨 Hoteles</button>
    <button onclick="showPage('gastronomia')" id="btn-gastronomia">🍴 Comida</button>
</nav>
