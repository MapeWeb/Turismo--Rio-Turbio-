<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Río Turbio - Guía Inteligente</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #004a8c; 
            --accent: #f39c12; 
            --bg: #f0f2f5;
            --light: #ffffff;
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding-bottom: 140px; /* Espacio extra para el reproductor */
            background-color: var(--bg);
        }

        header {
            background: var(--primary);
            color: white;
            padding: 25px 15px;
            text-align: center;
            border-bottom-left-radius: 25px;
            border-bottom-right-radius: 25px;
        }

        nav {
            display: flex;
            justify-content: center;
            padding: 15px;
            gap: 10px;
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--bg);
        }

        nav a {
            background: var(--light);
            color: var(--primary);
            text-decoration: none;
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .container { padding: 15px; max-width: 800px; margin: auto; }

        /* REJILLA FORZADA: 5 columnas en PC, 2 en Celular */
        #monumentos {
            display: grid !important; 
            grid-template-columns: repeat(5, 1fr) !important; 
            gap: 10px !important;
            margin-top: 10px;
        }

        .card-mini {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
            text-align: center;
            cursor: pointer;
            border: 2px solid transparent;
        }

        .card-mini img {
            width: 100% !important;
            height: 85px !important;
            object-fit: cover !important;
            display: block;
        }

        .card-mini h3 {
            font-size: 0.65rem;
            margin: 5px 2px;
            color: var(--primary);
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1.1;
        }

        .fixed-player {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            padding: 15px;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.1);
            border-top: 4px solid var(--primary);
            z-index: 1000;
        }

        #playing-title {
            margin: 0 0 8px 0;
            font-size: 0.8rem;
            font-weight: bold;
            color: var(--primary);
            text-align: center;
        }

        @media (max-width: 600px) {
            #monumentos { grid-template-columns: repeat(2, 1fr) !important; }
        }
    </style>
</head>
<body>

<header>
    <h1>Río Turbio</h1>
    <p>Turismo Inteligente 2026</p>
</header>

<nav>
    <a href="#monumentos">🔊 Audioguías</a>
    <a href="#">🏨 Hoteles</a>
    <a href="#">🍴 Gastronomía</a>
</nav>

<div class="container">
    <div id="monumentos">
        <div class="card-mini" onclick="playAudio('monumento al minero audio guía.m4a', 'Monumento al Minero')">
            <img src="https://i.ibb.co/21ky25s2/Sin-monumento-minero.png" alt="Minero">
            <h3>Monumento al Minero</h3>
        </div>

        <div class="card-mini" onclick="playAudio('', 'Bosque de Duendes')">
            <img src="https://images.unsplash.com/photo-1441974231531-c6227db76b6e?auto=format&fit=crop&w=600&q=80" alt="Duendes">
            <h3>Bosque de Duendes</h3>
        </div>

        <div class="card-mini" onclick="playAudio('', 'Punto 4')"><img src="https://via.placeholder.com/150"><h3>Punto 4</h3></div>
        <div class="card-mini" onclick="playAudio('', 'Punto 3')"<img src="<img src="https://i.ibb.co/dwS2FTSS/mina-1.webp" alt="mina 1" border="0">
        <div class="card-mini" onclick="playAudio('', 'Punto 4')"><img src="https://via.placeholder.com/150"><h3>Punto 4</h3></div>
        <div class="card-mini" onclick="playAudio('', 'Punto 5')"><img src="https://via.placeholder.com/150"><h3>Punto 5</h3></div>
        <div class="card-mini" onclick="playAudio('', 'Punto 6')"><img src="https://via.placeholder.com/150"><h3>Punto 6</h3></div>
        <div class="card-mini" onclick="playAudio('', 'Punto 7')"><img src="https://via.placeholder.com/150"><h3>Punto 7</h3></div>
        <div class="card-mini" onclick="playAudio('', 'Punto 8')"><img src="https://via.placeholder.com/150"><h3>Punto 8</h3></div>
        <div class="card-mini" onclick="playAudio('', 'Punto 9')"><img src="https://via.placeholder.com/150"><h3>Punto 9</h3></div>
        <div class="card-mini" onclick="playAudio('', 'Punto 10')"><img src="https://via.placeholder.com/150"><h3>Punto 10</h3></div>
    </div>
</div>

<div class="fixed-player">
    <p id="playing-title">Seleccioná un punto para escuchar</p>
    <audio id="global-player" controls style="width: 100%;"></audio>
</div>

<script>
    function playAudio(url, title) {
        if(!url) {
            alert("Audio no disponible todavía");
            return;
        }
        const player = document.getElementById('global-player');
        const displayTitle = document.getElementById('playing-title');
        player.src = url;
        displayTitle.innerText = "Escuchando: " + title;
        player.play();
    }
</script>

</body>
</html>
