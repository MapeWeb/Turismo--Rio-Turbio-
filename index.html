<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Río Turbio - Guía Inteligente</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #004a8c; /* Azul Minero */
            --accent: #f39c12; /* Naranja Otoño */
            --bg: #f0f2f5;
            --light: #ffffff;
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding-bottom: 120px; /* Espacio para que el reproductor no tape las fotos */
            background-color: var(--bg);
        }

        header {
            background: var(--primary);
            color: white;
            padding: 25px 15px;
            text-align: center;
            border-bottom-left-radius: 25px;
            border-bottom-right-radius: 25px;
        }

        nav {
            display: flex;
            justify-content: center;
            padding: 15px;
            gap: 10px;
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--bg);
        }

        nav a {
            background: var(--light);
            color: var(--primary);
            text-decoration: none;
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .container { padding: 15px; max-width: 800px; margin: auto; }

        /* Rejilla de Miniaturas */
        #monumentos {
            display: grid;
            grid-template-columns: repeat(5, 1fr); 
            gap: 10px;
            margin-top: 10px;
        }

        .card-mini {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s;
            border: 2px solid transparent;
        }

        .card-mini:active { 
            transform: scale(0.95); 
            border-color: var(--accent);
        }

        .card-mini img {
            width: 100%;
            height: 85px;
            object-fit: cover;
        }

        .card-mini h3 {
            font-size: 0.65rem;
            margin: 5px 2px;
            color: var(--primary);
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1.1;
        }

        /* Reproductor Fijo Abajo */
        .fixed-player {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            padding: 15px;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.1);
            border-top: 4px solid var(--primary);
            z-index: 1000;
        }

        #playing-title {
            margin: 0 0 8px 0;
            font-size: 0.8rem;
            font-weight: bold;
            color: var(--primary);
            text-align: center;
        }

        /* Ajuste para celulares */
        @media (max-width: 600px) {
            #monumentos { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>

<header>
    <h1>Río Turbio</h1>
